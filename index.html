<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>標記掉落 即時編輯者</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .mono {
      font-family: 'Fira Code', monospace;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    @media print {
      @page {
        margin: 1cm;
        /* 設定頁面邊距為 1cm，避免被裁切 */
        size: auto;
      }

      /* 1. Global Reset */
      body,
      #root,
      main {
        height: auto !important;
        width: 100% !important;
        overflow: visible !important;
        display: block !important;
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
        /* 移除 padding，避免內容偏下 */
      }

      /* 2. Hide Non-Print Elements */
      header,
      section:first-of-type,
      /* Editor Panel */
      aside,
      /* Sidebar */
      .editor-pane,
      .controls,
      button {
        display: none !important;
      }

      /* 3. Target Preview Panel (The Right Side) */
      .preview-panel {
        display: block !important;
        position: static !important;
        width: 100% !important;
        height: auto !important;
        border: none !important;
        background: white !important;
        overflow: visible !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      /* Hide Floating Controls, Tips, and Status Bar within Preview Panel */
      /* These are absolute positioned divs or the bottom h-10 bar */
      .preview-panel > div.absolute,
      .preview-panel > div.h-10 {
        display: none !important;
      }

      /* 4. Fix The Diagram Container Structure (for Mermaid) */

      /* The Viewport (flex-1 overflow-hidden) */
      .preview-panel .flex-1 {
        position: static !important;
        overflow: visible !important;
        height: auto !important;
        background: white !important;
        background-image: none !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      /* Use wrapper classes to reset layout during print */
      .print-outer-wrapper,
      .print-preview-container {
        position: static !important;
        display: block !important;
        width: 100% !important;
        height: auto !important;
        transform: none !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      .print-paper {
        position: relative !important;
        inset: auto !important;
        width: 100% !important;
        height: auto !important;
        min-height: auto !important;
        transform: none !important;
        box-shadow: none !important;
        border: none !important;
        padding: 0 !important;
        margin: 0 auto !important;
        display: block !important;
      }

      /* 5. Markdown Preview Specific Styles */
      /* Target the prose container for Markdown content */
      .prose {
        max-width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
        /* 確保 Markdown 內容從頁面頂部開始 */
        color: black !important;
      }

      /* 重置 Tailwind Typography 的深色模式變數，確保列印時永遠是黑紙白字（或更準確地說：白紙黑字） */
      .prose, .prose-invert {
        --tw-prose-body: #000 !important;
        --tw-prose-headings: #000 !important;
        --tw-prose-lead: #333 !important;
        --tw-prose-links: #000 !important;
        --tw-prose-bold: #000 !important;
        --tw-prose-counters: #4b5563 !important;
        --tw-prose-bullets: #222 !important;
        --tw-prose-hr: #e5e7eb !important;
        --tw-prose-quotes: #111827 !important;
        --tw-prose-quote-borders: #e5e7eb !important;
        --tw-prose-captions: #4b5563 !important;
        --tw-prose-code: #000 !important;
        --tw-prose-pre-code: #e5e7eb !important;
        --tw-prose-pre-bg: #1f2937 !important;
        --tw-prose-th-borders: #d1d5db !important;
        --tw-prose-td-borders: #e5e7eb !important;
      }

      /* 強制將所有文字設為黑色，防止繼承深色模式的淺灰色 */
      .prose *, .prose-invert * {
        color: black !important;
        border-color: #ddd !important;
      }

      /* Remove any top margin from first element */
      .prose>*:first-child {
        margin-top: 0 !important;
      }

      /* Optimize spacing for print */
      .prose h1,
      .prose h2,
      .prose h3,
      .prose h4,
      .prose h5,
      .prose h6 {
        page-break-after: avoid;
        /* 避免標題後分頁 */
      }

      .prose pre,
      .prose table {
        page-break-inside: avoid;
        /* 避免程式碼和表格被分頁切斷 */
      }

      /* Ensure margins are exactly 10mm */
      @page {
        margin: 10mm !important;
      }
    }
  </style>

{
